case_id: CASE-03
title: 短尺合成音声（技術打ち合わせ）
purpose: >
  通常会議音声に近い短尺ケース（1〜2分）で ASR→LLM→minutes 生成品質を評価する。
  decisions・todos（担当候補・期限候補付き）・pending_items が最低1件ずつ含まれ、
  LLM が正しく抽出できるかを確認する。
  合成音声（open-jtalk）を使用するため個人情報なし・ネット不要。

meeting_type: 技術打ち合わせ（スプリント確認）
participants_count:
  min: 2
  max: 2
duration_minutes:
  min: 1
  max: 2
audio_quality: synthetic   # synthetic（合成音声）

# CASE-01 / CASE-05 との違い:
# CASE-01: transcript を手動上書きして ASR をスキップ（パイプライン動作確認）
# CASE-05: 無音/ノイズ入力の異常系評価
# CASE-03: 合成音声を実際に ASR で文字起こしし、LLM の抽出精度を評価する

# --- 台本 ---
script:
  participants:
    A: 田中
    B: 佐藤
  lines:
    - speaker: A
      text: "お疲れ様です。先週のログイン画面のバグですが、昨日修正が完了しました。"
    - speaker: B
      text: "確認しました。本番反映は今週中に進めましょう。"
    - speaker: A
      text: "了解です。次のスプリントについてですが、検索機能の実装を田中が担当する予定です。"
    - speaker: B
      text: "来週金曜日までに基本実装をお願いできますか。"
    - speaker: A
      text: "承知しました。あと、外部APIの仕様書がまだ届いていないので、その点は引き続き確認中です。"
    - speaker: B
      text: "わかりました。届き次第共有してください。以上でよろしいでしょうか。"
    - speaker: A
      text: "はい。それでは以上です。"

# --- 期待結果 ---
expected:
  summary: >
    ログイン画面のバグ修正が完了し本番反映の方針を確認した。
    次スプリントでは田中が検索機能の実装を担当する。
    外部API仕様書の到着待ちが保留事項として残った。
  decisions:
    - "ログイン画面のバグ修正が完了した"
    - "本番反映を今週中に行う"
  todos:
    - task: "検索機能の基本実装"
      owner_candidate: "田中"
      due_date_candidate: "来週金曜日"
  pending_items:
    - "外部APIの仕様書の確認待ち"

# --- 音声生成手順（open-jtalk） ---
input_generation:
  method: open-jtalk
  install: |
    sudo apt install -y open-jtalk open-jtalk-mecab-naist-jdic hts-voice-nitech-jp-atr503-m001
  voice: /usr/share/hts-voice/nitech-jp-atr503-m001/nitech_jp_atr503_m001.htsvoice
  steps:
    - step: 1
      description: "台本の各発話テキストを個別 wav に変換する"
      command_template: |
        echo "{text}" | open_jtalk \
          -x /var/lib/mecab/dic/open-jtalk/naist-jdic \
          -m /usr/share/hts-voice/nitech-jp-atr503-m001/nitech_jp_atr503_m001.htsvoice \
          -r 1.0 -fm 200 -jf 0.5 \
          -ow /tmp/case03_line{n}.wav
    - step: 2
      description: "発話間に 0.5 秒の無音を挟み ffmpeg で結合して mp4 化する"
      command_template: |
        ffmpeg -f concat -safe 0 -i /tmp/case03_filelist.txt \
          -c:a aac /tmp/case03_synthetic.mp4 -y
  notes:
    - 音声ファイル（wav / mp4）はリポジトリにコミットしない（.gitignore 設定済み）
    - open-jtalk は1話者のみのため、話者交代は発話間の無音間隔で表現する
    - 生成品質確認後に speed / pitch オプションで調整可

# --- 評価観点 ---
expected_checks:
  asr:
    - ASR が合成音声を概ね正確に文字起こしすること
    - 台本テキストと transcript の一致率が概ね高いこと（定性確認）
  content:
    - decisions に「バグ修正完了」「本番反映」相当の内容が含まれること
    - todos に「検索機能」「田中」「来週金曜日」相当の内容が含まれること
    - pending_items に「外部API」「仕様書」相当の内容が含まれること
    - summary が会議の概要を概ね反映していること
  pipeline:
    - パイプラインがクラッシュしないこと
    - 全8セクションが出力されること
  performance:
    - パイプライン全体が 5 分以内に完了すること（1〜2 分音声の目安）

acceptance_criteria:
  - パイプラインがクラッシュ・例外終了しないこと
  - decisions が1件以上抽出されること
  - todos が1件以上抽出されること（owner_candidate または due_date_candidate のいずれかが含まれること）
  - pending_items が1件以上抽出されること
  - summary が空でないこと

notes:
  - 音声/動画ファイルはリポジトリにコミットしない（.gitignore 設定済み）
  - 実行は別タスク。まず open-jtalk のインストールを確認してから進める
  - 評価結果は eval/results/CASE-03/eval.yaml に記録すること（実行後）
  - LLM の非決定論的な出力により decisions/todos の文言は完全一致しなくてよい
