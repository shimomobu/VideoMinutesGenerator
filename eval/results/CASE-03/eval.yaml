# --- run-1 結果 ---
run_1:
  executed_at: "2026-04-28"
  job_id: job_20260428_023520_00dbd9
  purpose: "合成音声（open-jtalk）を実際に ASR で文字起こしし、LLM の抽出精度を評価する"
  execution_notes: |
    open-jtalk で生成した台本7発話（44.3秒）の mp4 を入力として通常実行。
    ASR（Whisper small, device=cpu）、LLM（gemma4）を実行。
    CUDA_VISIBLE_DEVICES="" なしで実行。

  checks:
    pipeline:
      all_stages_passed: true
      stage_errors: []
      output_files_generated: true   # minutes.md / minutes.json / manifest.json 生成 ✅

    asr:
      hallucination_detected: false
      transcript_quality: low        # open-jtalk 合成音声に対して誤認識が多い
      notable_errors:
        - "「ログイン画面のバグ」→「ロビンが面の間に」"
        - "「スプリント」→「スプーンと」"
        - "「実装」→「自走」"
        - "「API仕様書」→「外部エピナイの使用書」"
        - "「以上」→「異常」（2箇所）"

    content:
      summary_not_empty: true
      decisions_count: 2
      decisions_extracted:
        - "本番環境での対応は今週中に進めることで合意した"         # 期待値「本番反映を今週中」に対応 ✅
        - "スプーン検索機能の基本自走は、田中が来週金曜日までに実施することとした"  # 誤認識ベースだが意味は近い △
      decisions_missing:
        - "「バグ修正完了」相当の decision が抽出されなかった"       # 期待値の1件が漏れ ❌
      todos_count: 2
      todos_extracted:
        - task: "「スプーン」検索機能の基本自走を実施する"
          owner_candidate: "田中"
          due_date_candidate: "来週金曜日"                    # 担当・期限ともに正しく抽出 ✅
        - task: "外部APIの使用書が届かない場合に速やかに関係者に共有する"
          owner_candidate: null
          due_date_candidate: null
      pending_items_count: 1
      pending_items_extracted:
        - "外部APIの使用書が到着するかどうか（継続的な確認が必要）"    # 期待値「外部API仕様書確認待ち」に対応 ✅

    markdown:
      starts_with_h1_minutes: true
      has_all_sections: true
    json:
      schema_valid: true
      job_id_matches: true

  acceptance_criteria:
    no_crash: true                   # クラッシュなし ✅
    decisions_one_or_more: true      # decisions 2件 ✅
    todos_with_owner_or_due: true    # todos に owner=田中・due=来週金曜日 ✅
    pending_items_one_or_more: true  # pending_items 1件 ✅
    summary_not_empty: true          # summary 空でない ✅

  performance:
    asr_duration_ms: 35478           # ~35秒（CPU実行）
    analysis_extractor_duration_ms: 239905  # ~240秒
    total_pipeline_time_sec: ~275

  verdict: PASS
  notes: |
    acceptance_criteria は全項目クリア。ただし品質上の問題あり：
    1. ASR 誤認識が多い（open-jtalk 合成音声は Whisper との相性が低め）
       「スプリント」→「スプーンと」「ログイン画面」→「ロビンが面の間に」等
    2. decisions の1件（「バグ修正完了」）が抽出されなかった
       ASR では「修正が完了しました」と聞き取れているが LLM が decisions に含めなかった
    3. todos の task 名に誤認識文字列（「スプーン」「自走」）が混入した
    LLM は誤認識 transcript から意味をある程度解釈できているが、
    ASR 品質の低さが抽出精度の上限を決めている。
    実音声（マイク録音）での再評価が望ましい。
