      schema_valid: true
      job_id_matches: true

  acceptance_criteria:
    no_crash: true                   # クラッシュなし ✅
    no_fake_decisions: true          # 架空の decisions 不出力 ✅
    no_fake_todos: true              # 架空の todos 不出力 ✅
    hallucination_recorded: true     # ハルシネーション transcript を記録 ✅

  performance:
