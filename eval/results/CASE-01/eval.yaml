    severity: low
    description: "無音動画では Whisper が日本語ハルシネーションを生成する"
    details: "「ご視聴ありがとうございました」が transcript に出力された。評価用は実発話音声が望ましい。"
    action_required: "CASE-01 の実動画準備、または音声入りダミー動画に切り替え"

next_steps:
