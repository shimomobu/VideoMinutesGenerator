issues:
  - id: ISSUE-01
    severity: medium
    description: "analysis.extractor の応答時間が 297 秒で 300 秒タイムアウトに近接"
    details: |
      gemma4:latest が 7 セグメント transcript で ~297 秒かかる。
      300 秒タイムアウト（config.yaml）ギリギリで、Ollama の状態次第で 500 エラーになる
      （同日の別実行で 3 回連続 HTTP 500 を確認）。
    action_required: "タイムアウト延長（600秒）、prompt短縮、またはより高速なモデルへの切り替えを検討"

  - id: ISSUE-02
    severity: low
    description: "無音動画では Whisper が日本語ハルシネーションを生成する"
    details: "「ご視聴ありがとうございました」が transcript に出力された。C案では transcript を手動上書きして回避。"
    action_required: "実音声付きダミー動画を用意するか、実動画で再評価する"

  - id: ISSUE-03
    severity: low
    description: "Ollama と Whisper の GPU 競合（CUDA OOM）"
    details: |
      Ollama が GPU をほぼ占有している状態で Whisper がモデルロードに失敗する。
      transcript.json が既存であれば Whisper は不要だが、WhisperLocalProvider の
      __init__ で eager load するため CLI 起動時に OOM が発生する。
    action_required: "WhisperLocalProvider の lazy load 化、または CUDA_VISIBLE_DEVICES=\"\" の運用手順化"

