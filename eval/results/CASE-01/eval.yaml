  analysis_extractor_duration_sec: ~297  # Ollama gemma4:latest（7セグメント）
  formatter_export_duration_ms: ~200
  total_pipeline_time_sec: ~310       # ASR スキップのため extractor が支配的

extracted_content:
  summary: "今週は認証モジュールのリファクタリング完了とAPIレスポンス速度の改善が確認された
    スプリントレビューでした。次スプリントでは検索機能の実装を最優先で進めることが決定されました。"
  decisions:
    - "APIレスポンス速度改善（p50: 200ms→120ms）は完了事項として正式に記録する。"
    - "ログ基盤の見直しは、優先度を下げるため次々回のスプリントで検討する。"
  todos:
    - task: "検索機能の実装を最優先で実施する。"
      owner_candidate: "田中さん"
      due_date_candidate: "来週金曜日"
  pending_items:
    - "データベースのマイグレーションに関する最終確認。本番環境への適用は来週火曜日に予定されている。"

issues:
  - id: ISSUE-01
    severity: medium
    description: "analysis.extractor の応答時間が 297 秒で 300 秒タイムアウトに近接"
    details: |
      gemma4:latest が 7 セグメント transcript で ~297 秒かかる。
      300 秒タイムアウト（config.yaml）ギリギリで、Ollama の状態次第で 500 エラーになる
      （同日の別実行で 3 回連続 HTTP 500 を確認）。
    action_required: "タイムアウト延長（600秒）、prompt短縮、またはより高速なモデルへの切り替えを検討"

  - id: ISSUE-02
    severity: low
    description: "無音動画では Whisper が日本語ハルシネーションを生成する"
    details: "「ご視聴ありがとうございました」が transcript に出力された。C案では transcript を手動上書きして回避。"
    action_required: "実音声付きダミー動画を用意するか、実動画で再評価する"

  - id: ISSUE-03
    severity: low
    description: "Ollama と Whisper の GPU 競合（CUDA OOM）"
    details: |
      Ollama が GPU をほぼ占有している状態で Whisper がモデルロードに失敗する。
      transcript.json が既存であれば Whisper は不要だが、WhisperLocalProvider の
      __init__ で eager load するため CLI 起動時に OOM が発生する。
    action_required: "WhisperLocalProvider の lazy load 化、または CUDA_VISIBLE_DEVICES=\"\" の運用手順化"

next_steps:
  - timeout 改善: config.yaml の timeout_seconds を 600 に変更、または高速モデルへ切り替え
  - Whisper lazy load 化の検討（WhisperLocalProvider.__init__ でのモデルロードを transcribe() に遅延）
  - 実音声付きダミー動画での CASE-01 再評価
