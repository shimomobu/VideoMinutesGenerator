      gemma4:latest / qwen2.5-coder:7b ともに日本語 JSON 生成で 120〜240 秒かかる。
      現在のタイムアウトは extractor/__init__.py に 120.0 秒ハードコード。
    action_required: "タイムアウト値を 300〜600 秒に拡張するか、軽量モデルに切り替える"

