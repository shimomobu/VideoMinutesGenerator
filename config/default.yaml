# VideoMinutesGenerator デフォルト設定
# 本番環境では環境変数または .env で上書きすること

asr:
  provider: whisper_local   # whisper_local | whisper_api | faster_whisper
  model_size: small         # tiny | base | small | medium | large
  language: ja
  initial_prompt: "これはシステム開発に関する技術的な会議の録音です。外部API、仕様書、バグ修正、本番反映、スプリント、検索機能について議論します。"  # null または空欄の場合は Whisper に渡さない
  correction:
    enabled: true
    dict_path: config/correction_dict.yaml

analysis:
  provider: ollama
  model: gemma4
  base_url: http://localhost:11434
  max_retries: 3
  timeout_seconds: 900

api_policy:
  send_audio: false         # 音声ファイルの外部送信を禁止
  send_video: false         # 映像ファイルの外部送信を禁止
  send_transcript: false    # transcript テキストの外部送信を禁止（完全ローカル）
  anonymize_mode: false     # 匿名化モード（将来拡張）

diarization:
  enabled: false            # MVP では無効。将来 pyannote.audio で有効化

formatter:
  template: standard        # standard のみ（MVP）

pipeline:
  input_dir: data/input
  work_dir: data/work
  output_dir: data/output
  log_dir: logs

logging:
  level: INFO
  format: jsonl
